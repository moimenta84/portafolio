    <!-- ─── Critical CSS inline: previene FOUT / CLS ──────── -->
    <style>
      /* font-display swap fallback para evitar FOIT */
      @font-face {
        font-family: "Inter";
        font-style: normal;
        font-weight: 400 900;
        font-display: swap;
        src: local("Inter");
      }
      @font-face {
        font-family: "JetBrains Mono";
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: local("JetBrains Mono");
      }
      /* Evita CLS en el root mientras React hidrata */
      html, body, #root {
        min-height: 100dvh;
        background-color: #030712;
        color: #ffffff;
        margin: 0;
        padding: 0;
      }
      /* Animaciones desactivadas si el usuario lo prefiere */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
